name: Tests

on:
  push:
    branches:
      - tests
  pull_request:
    branches:
      - tests

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.0
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.0"

      - name: Clone home-assistant/core
        uses: actions/checkout@v3
        with:
          repository: home-assistant/core
          path: core

      - name: Setup Home Assistant
        working-directory: core
        run: |
          script/setup

      - name: Activate virtualenv
        working-directory: core
        run: |
          source venv/bin/activate
          echo PATH=$PATH >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: core
        run: |
          pip3 install -r requirements_test_all.txt

      - name: Install custom component
        run: |
          mkdir -p core/custom_components/open_epaper_link
          cp -r custom_components/open_epaper_link/* core/custom_components/open_epaper_link

      - name: Copy tests to core/tests/components/open_epaper_link
        run: |
          mkdir -p core/tests/components/open_epaper_link
          cp -r tests/* core/tests/components/open_epaper_link

      - name: Run tests
        working-directory: core
        run: |
          pytest tests/components/open_epaper_link